upstream laravel {
    server laravel-api:8000;
}

server {
    listen 80;
    server_name _;

    # Auth routes — public (login/register) and JWT-protected (logout/me) are all
    # handled by Laravel's own middleware; Nginx does not interfere here.
    location /api/auth/ {
        proxy_pass         http://laravel;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization   $http_authorization;
    }

    # All other API routes — Nginx validates JWT via auth_request, then injects
    # X-User-Id so Laravel's SetAuthenticatedUser middleware can hydrate auth()->user().
    location /api/ {
        auth_request     /_auth;
        auth_request_set $auth_user_id    $upstream_http_x_user_id;
        auth_request_set $auth_user_email $upstream_http_x_user_email;

        proxy_pass         http://laravel;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-User-Id       $auth_user_id;
        proxy_set_header   X-User-Email    $auth_user_email;
    }

    # Internal subrequest target for auth_request — never reachable from outside.
    # Calls Laravel's validate endpoint which returns X-User-Id on success.
    location = /_auth {
        internal;
        proxy_pass              http://laravel/api/auth/validate;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length  "";
        proxy_set_header        X-Original-URI  $request_uri;
        proxy_set_header        Authorization   $http_authorization;
    }
}
