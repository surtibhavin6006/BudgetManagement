upstream laravel {
    server laravel-api:8000;
}

upstream upload {
    server upload-service:8002;
}

# ── budget.dev — Frontend + Dev Panel ──────────────────────────────────────────
server {
    listen 80;
    server_name budget.test;

    # Dev panel — basic auth protected
    location = /monitor {
        auth_basic           "Budget Management — Dev Panel";
        auth_basic_user_file /etc/nginx/.htpasswd;
        root                 /usr/share/nginx/html;
        try_files            /index.html =404;
    }

    # Placeholder until React frontend is built
    location / {
        return 200 'Frontend coming soon';
        add_header Content-Type text/plain;
    }
}

# ── api.budget.dev — Laravel API ───────────────────────────────────────────────
server {
    listen 80;
    server_name api.budget.test;

    # Public auth routes — no JWT check
    # api.budget.dev/auth/* → laravel:8000/api/auth/*
    location /auth/ {
        proxy_pass         http://laravel/api/auth/;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization   $http_authorization;
    }

    # Scramble API docs — public
    # api.budget.dev/docs → laravel:8000/docs
    location /docs {
        proxy_pass         http://laravel;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Protected API routes — JWT validated, X-User-Id injected
    # api.budget.dev/categories → laravel:8000/api/categories
    location / {
        auth_request     /_auth;
        auth_request_set $auth_user_id    $upstream_http_x_user_id;
        auth_request_set $auth_user_email $upstream_http_x_user_email;

        proxy_pass         http://laravel/api/;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-User-Id       $auth_user_id;
        proxy_set_header   X-User-Email    $auth_user_email;
    }

    location = /_auth {
        internal;
        proxy_pass              http://laravel/api/auth/validate;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length  "";
        proxy_set_header        X-Original-URI  $request_uri;
        proxy_set_header        Authorization   $http_authorization;
    }
}

# ── api.upload-service.dev — Upload Service ─────────────────────────────────────
server {
    listen 80;
    server_name api.upload-service.test;

    # All routes protected — JWT validated, X-User-Id injected
    # api.upload-service.dev/statement → upload:8002/statement
    location / {
        auth_request     /_auth;
        auth_request_set $auth_user_id    $upstream_http_x_user_id;
        auth_request_set $auth_user_email $upstream_http_x_user_email;

        client_max_body_size 20m;

        proxy_pass         http://upload;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-User-Id       $auth_user_id;
        proxy_set_header   X-User-Email    $auth_user_email;
    }

    # Swagger docs — bypass auth so devs can browse without a token
    location /docs {
        proxy_pass         http://upload;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /openapi.json {
        proxy_pass         http://upload;
        proxy_set_header   Host            $host;
    }

    location = /_auth {
        internal;
        proxy_pass              http://laravel/api/auth/validate;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length  "";
        proxy_set_header        X-Original-URI  $request_uri;
        proxy_set_header        Authorization   $http_authorization;
    }
}
