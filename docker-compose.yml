name: budget-management

services:

  nginx:
    build:
      context: ./services/nginx
    container_name: nginx
    ports:
      - "80:80"
    environment:
      FRONTEND_DOMAIN: ${FRONTEND_DOMAIN:-budget.test}
      API_DOMAIN: ${API_DOMAIN:-api.budget.test}
      MINIO_DOMAIN: ${MINIO_DOMAIN:-minio.budget.test}
      REDIS_DOMAIN: ${REDIS_DOMAIN:-redis.budget.test}
      UPTIME_DOMAIN: ${UPTIME_DOMAIN:-uptime.budget.test}
    volumes:
      - ./services/nginx/templates:/etc/nginx/conf-templates:ro
      - ./services/nginx/html:/etc/nginx/html-src:ro
      - ./services/nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - laravel-api
      - upload-service
    networks:
      - budget-net

  laravel-api:
    build:
      context: ./services/laravel-api
    container_name: laravel-api
    volumes:
      - ./services/laravel-api:/var/www
    ports:
      - "8000:8000"
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: budget_management
      DB_USERNAME: app
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: file
      SESSION_DRIVER: file
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - budget-net

  upload-service:
    build:
      context: ./services/upload-service
    container_name: upload-service
    volumes:
      - ./services/upload-service:/app
    ports:
      - "8002:8002"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: budget_management
      DB_USERNAME: app
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_HOST: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: statements
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - budget-net

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: budget_management
      MYSQL_USER: app
      MYSQL_PASSWORD: secret
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 10
    networks:
      - budget-net

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - budget-net

  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    networks:
      - budget-net

  adminer:
    image: adminer:latest
    container_name: adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
      ADMINER_DESIGN: pepa-linha-dark
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - budget-net

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    ports:
      - "5540:5540"
    volumes:
      - redisinsight-data:/data
    networks:
      - budget-net

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    ports:
      - "3001:3001"
    volumes:
      - uptime-kuma-data:/app/data
    networks:
      - budget-net

networks:
  budget-net:
    driver: bridge

volumes:
  mysql-data:
  minio-data:
  redisinsight-data:
  uptime-kuma-data:
